<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コアラの体調ノート</title>
</head>
<body>
<div id="root"><div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#f5f0f8;font-family:sans-serif;color:#7a6e84;font-size:14px;">読み込み中…</div></div>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ===== KOALA SVG COMPONENTS =====
const KoalaFace = ({ mood = 3 }) => {
  const e = mood >= 4 ? "happy" : mood <= 2 ? "sad" : "neutral";
  return (
    <svg viewBox="0 0 120 120" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="22" cy="35" rx="18" ry="20" fill="#9B8EA8" /><ellipse cx="22" cy="35" rx="11" ry="13" fill="#D4C5E2" />
      <ellipse cx="98" cy="35" rx="18" ry="20" fill="#9B8EA8" /><ellipse cx="98" cy="35" rx="11" ry="13" fill="#D4C5E2" />
      <ellipse cx="60" cy="65" rx="42" ry="40" fill="#B8AABF" />
      {e==="happy"?<><path d="M42 58 Q46 53 50 58" stroke="#4a3f55" strokeWidth="2.5" fill="none" strokeLinecap="round"/><path d="M70 58 Q74 53 78 58" stroke="#4a3f55" strokeWidth="2.5" fill="none" strokeLinecap="round"/></>
      :e==="sad"?<><ellipse cx="46" cy="59" rx="4" ry="4.5" fill="#4a3f55"/><ellipse cx="74" cy="59" rx="4" ry="4.5" fill="#4a3f55"/><path d="M40 54 Q46 58 52 54" stroke="#4a3f55" strokeWidth="1.5" fill="none" strokeLinecap="round"/><path d="M68 54 Q74 58 80 54" stroke="#4a3f55" strokeWidth="1.5" fill="none" strokeLinecap="round"/></>
      :<><ellipse cx="46" cy="59" rx="4" ry="4.5" fill="#4a3f55"/><ellipse cx="74" cy="59" rx="4" ry="4.5" fill="#4a3f55"/><circle cx="47.5" cy="57.5" r="1.2" fill="white"/><circle cx="75.5" cy="57.5" r="1.2" fill="white"/></>}
      <ellipse cx="60" cy="71" rx="9" ry="6.5" fill="#7a6680"/><ellipse cx="58" cy="69.5" rx="2.5" ry="1.5" fill="#9B8EA8" opacity="0.5"/>
      {e==="happy"?<path d="M52 78 Q60 85 68 78" stroke="#4a3f55" strokeWidth="2" fill="none" strokeLinecap="round"/>
      :e==="sad"?<path d="M52 82 Q60 76 68 82" stroke="#4a3f55" strokeWidth="2" fill="none" strokeLinecap="round"/>
      :<path d="M53 80 Q60 82 67 80" stroke="#4a3f55" strokeWidth="2" fill="none" strokeLinecap="round"/>}
    </svg>
  );
};
const KoalaOnBranch = () => (
  <svg viewBox="0 0 160 90" width="120" height="68" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 68 Q80 58 160 65" stroke="#8B6F4E" strokeWidth="8" fill="none" strokeLinecap="round"/>
    <path d="M0 68 Q80 58 160 65" stroke="#A0845C" strokeWidth="4" fill="none" strokeLinecap="round"/>
    <ellipse cx="30" cy="52" rx="10" ry="6" fill="#7aab8a" transform="rotate(-30 30 52)" opacity="0.9"/>
    <ellipse cx="45" cy="45" rx="9" ry="5" fill="#6a9b7a" transform="rotate(-20 45 45)" opacity="0.8"/>
    <ellipse cx="120" cy="50" rx="10" ry="6" fill="#7aab8a" transform="rotate(20 120 50)" opacity="0.9"/>
    <ellipse cx="135" cy="43" rx="9" ry="5" fill="#6a9b7a" transform="rotate(35 135 43)" opacity="0.8"/>
    <ellipse cx="80" cy="56" rx="16" ry="18" fill="#B8AABF"/>
    <path d="M66 66 Q62 72 68 70" stroke="#9B8EA8" strokeWidth="5" fill="none" strokeLinecap="round"/>
    <path d="M94 66 Q98 72 92 70" stroke="#9B8EA8" strokeWidth="5" fill="none" strokeLinecap="round"/>
    <ellipse cx="64" cy="30" rx="11" ry="12" fill="#9B8EA8"/><ellipse cx="64" cy="30" rx="7" ry="8" fill="#D4C5E2"/>
    <ellipse cx="96" cy="30" rx="11" ry="12" fill="#9B8EA8"/><ellipse cx="96" cy="30" rx="7" ry="8" fill="#D4C5E2"/>
    <ellipse cx="80" cy="40" rx="20" ry="19" fill="#B8AABF"/>
    <ellipse cx="73" cy="38" rx="3" ry="3.5" fill="#4a3f55"/><ellipse cx="87" cy="38" rx="3" ry="3.5" fill="#4a3f55"/>
    <circle cx="74" cy="36.5" r="1" fill="white"/><circle cx="88" cy="36.5" r="1" fill="white"/>
    <ellipse cx="80" cy="44" rx="5.5" ry="4" fill="#7a6680"/>
    <path d="M75 49 Q80 53 85 49" stroke="#4a3f55" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
  </svg>
);
const KoalaSleeping = () => (
  <svg viewBox="0 0 80 60" width="52" height="40" xmlns="http://www.w3.org/2000/svg">
    <text x="54" y="16" fontSize="9" fill="#9B8EA8" fontWeight="bold" opacity="0.7">z</text>
    <text x="60" y="9" fontSize="7" fill="#9B8EA8" fontWeight="bold" opacity="0.5">z</text>
    <ellipse cx="22" cy="22" rx="10" ry="11" fill="#9B8EA8"/><ellipse cx="22" cy="22" rx="6" ry="7" fill="#D4C5E2"/>
    <ellipse cx="46" cy="22" rx="10" ry="11" fill="#9B8EA8"/><ellipse cx="46" cy="22" rx="6" ry="7" fill="#D4C5E2"/>
    <ellipse cx="34" cy="34" rx="20" ry="18" fill="#B8AABF"/>
    <path d="M24 32 Q27 30 30 32" stroke="#4a3f55" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
    <path d="M38 32 Q41 30 44 32" stroke="#4a3f55" strokeWidth="1.8" fill="none" strokeLinecap="round"/>
    <ellipse cx="34" cy="38" rx="5" ry="3.5" fill="#7a6680"/>
    <path d="M29 43 Q34 47 39 43" stroke="#4a3f55" strokeWidth="1.5" fill="none" strokeLinecap="round"/>
  </svg>
);
const KoalaTiny = ({ size = 22 }) => (
  <svg viewBox="0 0 40 40" width={size} height={size} xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="8" cy="14" rx="7" ry="8" fill="#9B8EA8"/><ellipse cx="8" cy="14" rx="4" ry="5" fill="#D4C5E2"/>
    <ellipse cx="32" cy="14" rx="7" ry="8" fill="#9B8EA8"/><ellipse cx="32" cy="14" rx="4" ry="5" fill="#D4C5E2"/>
    <ellipse cx="20" cy="24" rx="15" ry="14" fill="#B8AABF"/>
    <ellipse cx="15" cy="22" rx="2.5" ry="3" fill="#4a3f55"/><ellipse cx="25" cy="22" rx="2.5" ry="3" fill="#4a3f55"/>
    <circle cx="15.8" cy="21" r="0.8" fill="white"/><circle cx="25.8" cy="21" r="0.8" fill="white"/>
    <ellipse cx="20" cy="27" rx="4" ry="3" fill="#7a6680"/>
    <path d="M16 32 Q20 35 24 32" stroke="#4a3f55" strokeWidth="1.2" fill="none" strokeLinecap="round"/>
  </svg>
);
const EucalyptusLeaf = () => (
  <svg viewBox="0 0 24 24" width="16" height="16" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="12" cy="12" rx="6" ry="10" fill="#7aab8a" transform="rotate(-30 12 12)"/>
    <line x1="12" y1="4" x2="12" y2="20" stroke="#5a8a6a" strokeWidth="1" transform="rotate(-30 12 12)"/>
  </svg>
);

// ===== CONSTANTS =====
const MOODS = [
  { value:1, label:"とてもつらい", emoji:"😔", color:"#c4788a" },
  { value:2, label:"つらい",       emoji:"😞", color:"#d4957a" },
  { value:3, label:"ふつう",       emoji:"😐", color:"#c8b870" },
  { value:4, label:"まあまあ",     emoji:"🙂", color:"#7aab8a" },
  { value:5, label:"よい",         emoji:"😊", color:"#6a9ab0" },
];
const SLEEP_QUALITY = [
  { value:1, label:"眠れなかった" }, { value:2, label:"あまり眠れなかった" },
  { value:3, label:"まあまあ" },     { value:4, label:"よく眠れた" },
];
const APPETITE = [
  { value:1, label:"ほとんど食べられなかった" }, { value:2, label:"少し食べた" },
  { value:3, label:"まあまあ食べた" },           { value:4, label:"普通に食べられた" },
];
const DEFAULT_SYMPTOMS = [
  "気力がわかない","集中できない","不安感が強い","イライラする","涙が出る",
  "体がだるい","頭痛","動悸","過呼吸","外出できない",
];
const DEFAULT_MEDS = [
  { id:"med-1", name:"イフェクサー",            unit:"錠", defaultDose:1, timing:"朝食後" },
  { id:"med-2", name:"タンドスピロンクエン酸塩", unit:"錠", defaultDose:2, timing:"昼食後" },
  { id:"med-3", name:"クービビック",             unit:"錠", defaultDose:1, timing:"就寝前" },
  { id:"med-4", name:"ブロチゾラム",             unit:"錠", defaultDose:1, timing:"就寝前" },
];

// ===== STORAGE HELPERS (localStorage) =====
const sget = async (key) => {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
  catch { return null; }
};
const sset = async (key, val) => {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
};

const getTodayKey = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
};
const formatDate = (key) => {
  const d = new Date(key + "T00:00:00");
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${"日月火水木金土"[d.getDay()]}）`;
};

// ===== SYMPTOMS SECTION =====
const SymptomsSection = ({ cardStyle, colors, btnStyle, customSymptoms, form, toggleSymptom, handleDeleteCustomSymptom, handleAddSymptom, showDeleteMode, setShowDeleteMode }) => {
  const [input, setInput] = useState("");
  const doAdd = () => { if (input.trim()) { handleAddSymptom(input.trim()); setInput(""); } };
  return (
    <div style={cardStyle}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"12px" }}>
        <div style={{ display:"flex", alignItems:"center", gap:"6px" }}>
          <EucalyptusLeaf/>
          <span style={{ fontSize:"14px", fontWeight:"600", color:colors.text }}>今日あった症状（複数選択可）</span>
        </div>
        {customSymptoms.length > 0 && (
          <button onClick={() => setShowDeleteMode(v => !v)} style={{ fontSize:"11px", color:showDeleteMode?colors.accentWarm:colors.textLight, background:"none", border:`1px solid ${showDeleteMode?colors.accentWarm:colors.border}`, borderRadius:"12px", padding:"3px 10px", cursor:"pointer" }}>
            {showDeleteMode ? "完了" : "編集"}
          </button>
        )}
      </div>
      <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:"10px" }}>
        {DEFAULT_SYMPTOMS.map(s => <button key={s} onClick={() => toggleSymptom(s)} style={btnStyle(form.symptoms.includes(s),"#c4788a")}>{s}</button>)}
      </div>
      {customSymptoms.length > 0 && (
        <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", marginBottom:"10px" }}>
          {customSymptoms.map(s => (
            <div key={s} style={{ position:"relative", display:"inline-flex", alignItems:"center" }}>
              <button onClick={() => !showDeleteMode && toggleSymptom(s)} style={{ ...btnStyle(form.symptoms.includes(s),"#9B8EA8"), paddingRight:showDeleteMode?"28px":"14px", opacity:showDeleteMode?0.75:1 }}>{s}</button>
              {showDeleteMode && <button onClick={() => handleDeleteCustomSymptom(s)} style={{ position:"absolute", right:"4px", top:"50%", transform:"translateY(-50%)", width:"18px", height:"18px", borderRadius:"50%", background:colors.accentWarm, border:"none", color:"white", fontSize:"12px", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", padding:0 }}>×</button>}
            </div>
          ))}
        </div>
      )}
      <div style={{ display:"flex", gap:"8px", alignItems:"center", marginTop:"4px" }}>
        <input type="text" value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key==="Enter") { e.preventDefault(); doAdd(); }}}
          placeholder="新しい症状を追加…" maxLength={20}
          style={{ flex:1, padding:"8px 12px", borderRadius:"20px", border:`1.5px solid ${colors.border}`, fontSize:"13px", outline:"none", color:colors.text, fontFamily:"inherit", backgroundColor:"white" }}
        />
        <button onClick={doAdd} disabled={!input.trim()} style={{ padding:"8px 14px", borderRadius:"20px", border:"none", background:input.trim()?colors.primary:colors.border, color:"white", fontSize:"13px", fontWeight:"600", cursor:input.trim()?"pointer":"default", whiteSpace:"nowrap" }}>＋追加</button>
      </div>
      <div style={{ fontSize:"11px", color:colors.textLight, marginTop:"6px" }}>追加した症状は次回以降も表示されます</div>
    </div>
  );
};

// ===== MAIN APP =====
function App() {
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("record");
  const [allData, setAllData] = useState({});
  const [customSymptoms, setCustomSymptoms] = useState([]);
  const [medList, setMedList] = useState(DEFAULT_MEDS);
  const [showDeleteMode, setShowDeleteMode] = useState(false);
  const [showMedEdit, setShowMedEdit] = useState(false);
  const [newMed, setNewMed] = useState({ name:"", unit:"錠", defaultDose:"", timing:"" });
  const [saved, setSaved] = useState(false);
  const [todayKey, setTodayKey] = useState(getTodayKey);
  const [selectedKey, setSelectedKey] = useState(getTodayKey);

  const [form, setForm] = useState({ mood:0, sleepHours:"", sleepQuality:0, appetite:0, hasSI:null, siIntensity:0, symptoms:[], memo:"", medLogs:{}, moodLog:[] });

  useEffect(() => {
    (async () => {
      const [data, syms, meds] = await Promise.all([sget("koala-health"), sget("koala-custom-symptoms"), sget("koala-med-list")]);
      const loaded = data || {};
      setAllData(loaded);
      setCustomSymptoms(syms || []);
      if (meds) {
        const savedIds = new Set(meds.map(m => m.id));
        const missing = DEFAULT_MEDS.filter(m => !savedIds.has(m.id));
        const merged = missing.length > 0 ? [...meds, ...missing] : meds;
        if (missing.length > 0) await sset("koala-med-list", merged);
        setMedList(merged);
      } else {
        await sset("koala-med-list", DEFAULT_MEDS);
      }
      const t = loaded[getTodayKey()] || {};
      setForm({ mood:t.mood||0, sleepHours:t.sleepHours||"", sleepQuality:t.sleepQuality||0, appetite:t.appetite||0, hasSI:t.hasSI??null, siIntensity:t.siIntensity||0, symptoms:t.symptoms||[], memo:t.memo||"", medLogs:t.medLogs||{}, moodLog:t.moodLog||[] });
      setLoading(false);
    })();
  }, []);

  useEffect(() => { setSaved(false); }, [form]);

  useEffect(() => {
    const checkDate = () => {
      const newKey = getTodayKey();
      setTodayKey(prev => prev !== newKey ? newKey : prev);
    };
    const interval = setInterval(checkDate, 60000);
    document.addEventListener("visibilitychange", checkDate);
    return () => { clearInterval(interval); document.removeEventListener("visibilitychange", checkDate); };
  }, []);

  useEffect(() => {
    setSelectedKey(todayKey);
  }, [todayKey]);

  useEffect(() => {
    if (!loading) {
      const t = allData[selectedKey] || {};
      setForm({ mood:t.mood||0, sleepHours:t.sleepHours||"", sleepQuality:t.sleepQuality||0, appetite:t.appetite||0, hasSI:t.hasSI??null, siIntensity:t.siIntensity||0, symptoms:t.symptoms||[], memo:t.memo||"", medLogs:t.medLogs||{}, moodLog:t.moodLog||[] });
      setSaved(false);
    }
  }, [selectedKey]);

  const updateForm = (key, val) => setForm(f => ({ ...f, [key]: val }));

  const handleSave = async () => {
    const updated = { ...allData, [selectedKey]: { ...form, savedAt: new Date().toISOString() } };
    setAllData(updated);
    await sset("koala-health", updated);
    setSaved(true);
  };

  const allSymptomsList = [...DEFAULT_SYMPTOMS, ...customSymptoms];
  const toggleSymptom = s => updateForm("symptoms", form.symptoms.includes(s) ? form.symptoms.filter(x=>x!==s) : [...form.symptoms, s]);

  const handleAddSymptom = async (text) => {
    const trimmed = (text||"").trim();
    if (!trimmed || allSymptomsList.includes(trimmed)) return;
    const updated = [...customSymptoms, trimmed];
    setCustomSymptoms(updated);
    await sset("koala-custom-symptoms", updated);
  };
  const handleDeleteCustomSymptom = async (s) => {
    const updated = customSymptoms.filter(x=>x!==s);
    setCustomSymptoms(updated);
    await sset("koala-custom-symptoms", updated);
    if (form.symptoms.includes(s)) updateForm("symptoms", form.symptoms.filter(x=>x!==s));
  };
  const handleAddMed = async () => {
    const name = newMed.name.trim();
    if (!name) return;
    const med = { id:Date.now().toString(), name, unit:newMed.unit.trim()||"錠", defaultDose:newMed.defaultDose?Number(newMed.defaultDose):null, timing:newMed.timing.trim()||null };
    const updated = [...medList, med];
    setMedList(updated);
    await sset("koala-med-list", updated);
    setNewMed({ name:"", unit:"錠", defaultDose:"", timing:"" });
  };
  const handleDeleteMed = async (id) => {
    const updated = medList.filter(m=>m.id!==id);
    setMedList(updated);
    await sset("koala-med-list", updated);
    const ml = { ...(form.medLogs||{}) };
    delete ml[id];
    updateForm("medLogs", ml);
  };
  const updateMedLog = (id, field, value) => {
    const ml = { ...(form.medLogs||{}) };
    ml[id] = { ...(ml[id]||{taken:null,dose:""}), [field]:value };
    updateForm("medLogs", ml);
  };

  const colors = { bg:"#f5f0f8", card:"#ffffff", primary:"#9B8EA8", primaryLight:"#D4C5E2", accent:"#7aab8a", accentWarm:"#c4788a", text:"#3d3445", textLight:"#7a6e84", border:"#e0d8ea" };
  const btnStyle = (active, color=colors.primary) => ({ padding:"8px 14px", borderRadius:"20px", border:`2px solid ${active?color:colors.border}`, background:active?color:"white", color:active?"white":colors.textLight, cursor:"pointer", fontSize:"13px", fontWeight:active?"600":"400", transition:"all 0.2s" });
  const cardStyle = { background:colors.card, borderRadius:"16px", padding:"18px", marginBottom:"14px", border:`1px solid ${colors.border}`, boxShadow:"0 2px 8px rgba(155,142,168,0.08)" };
  const sectionLabel = (text, icon=null) => (
    <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"12px" }}>
      {icon ?? <EucalyptusLeaf/>}
      <span style={{ fontSize:"14px", fontWeight:"600", color:colors.text }}>{text}</span>
    </div>
  );

  const RecordView = () => {
    const getNow = () => { const n = new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };
    const [newMoodTime, setNewMoodTime] = useState(getNow);
    const [newMoodValue, setNewMoodValue] = useState(0);
    const addMoodEntry = () => {
      if (!newMoodValue) return;
      const entry = { time: newMoodTime, mood: newMoodValue };
      const updatedLog = [...(form.moodLog||[]), entry].sort((a,b)=>a.time.localeCompare(b.time));
      setForm(f => ({ ...f, moodLog: updatedLog, mood: updatedLog[updatedLog.length-1].mood }));
      setNewMoodValue(0); setNewMoodTime(getNow());
    };
    const removeMoodEntry = (index) => {
      const updatedLog = (form.moodLog||[]).filter((_,i)=>i!==index);
      setForm(f => ({ ...f, moodLog: updatedLog, mood: updatedLog.length>0?updatedLog[updatedLog.length-1].mood:0 }));
    };
    return (
    <div>
      <div style={{ textAlign:"center", padding:"10px 0 8px" }}>
        <KoalaOnBranch/>
        <div style={{ marginTop:"2px" }}><KoalaFace mood={form.mood||3}/></div>
        <div style={{ fontSize:"12px", color:colors.textLight, marginTop:"2px" }}>
          {form.mood ? MOODS.find(m=>m.value===form.mood)?.label : selectedKey===todayKey?"今日の気分を記録してね":"この日の気分を記録"}
        </div>
        <div style={{ marginTop:"10px", display:"flex", alignItems:"center", justifyContent:"center", gap:"8px", flexWrap:"wrap" }}>
          <input type="date" value={selectedKey} max={todayKey}
            onChange={e => { if (e.target.value) setSelectedKey(e.target.value); }}
            style={{ padding:"6px 12px", borderRadius:"20px", border:`1.5px solid ${selectedKey!==todayKey?colors.accentWarm:colors.border}`, fontSize:"13px", outline:"none", color:colors.text, fontFamily:"inherit" }}
          />
          {selectedKey!==todayKey&&(
            <button onClick={()=>setSelectedKey(todayKey)} style={{ fontSize:"12px", color:colors.primary, background:"none", border:`1px solid ${colors.primary}`, borderRadius:"12px", padding:"4px 10px", cursor:"pointer" }}>
              今日に戻る
            </button>
          )}
        </div>
        {selectedKey!==todayKey&&(
          <div style={{ fontSize:"11px", color:colors.accentWarm, marginTop:"4px" }}>過去の日付を編集中</div>
        )}
      </div>

      <div style={cardStyle}>
        {sectionLabel("気分の記録（時間帯別）")}
        {(form.moodLog||[]).length>0&&(
          <div style={{ marginBottom:"12px" }}>
            {(form.moodLog||[]).map((entry,i)=>{
              const mi=MOODS.find(m=>m.value===entry.mood);
              return (
                <div key={i} style={{ display:"flex",alignItems:"center",gap:"10px",padding:"9px 12px",background:colors.bg,borderRadius:"10px",marginBottom:"6px",border:`1.5px solid ${mi?.color||colors.border}` }}>
                  <span style={{ fontSize:"13px",color:colors.textLight,minWidth:"42px",fontWeight:"600" }}>{entry.time}</span>
                  <span style={{ fontSize:"20px" }}>{mi?.emoji}</span>
                  <span style={{ fontSize:"13px",color:colors.text,flex:1 }}>{mi?.label}</span>

  const HistoryView = () => {
    const entries = Object.entries(allData).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,30);
    if (entries.length===0) return <div style={{ textAlign:"center",padding:"40px 20px",color:colors.textLight }}><KoalaFace mood={3}/><div style={{ marginTop:"12px",fontSize:"14px" }}>まだ記録がありません</div></div>;
    return (
      <div>
        {entries.map(([key,data])=>{
          const moodInfo=MOODS.find(m=>m.value===data.mood);
          return (
            <div key={key} style={{ ...cardStyle,borderLeft:`4px solid ${moodInfo?.color||colors.border}` }}>
              <div style={{ fontSize:"12px",color:colors.textLight,marginBottom:"8px" }}>{formatDate(key)}</div>

                {moodInfo&&<span>{moodInfo.emoji} <strong>{moodInfo.label}</strong></span>}
                {data.sleepHours&&<span>💤 {data.sleepHours}時間</span>}
                {data.medLogs&&Object.keys(data.medLogs).length>0&&(()=>{
                  const logs=data.medLogs;
                  const taken=Object.values(logs).filter(l=>l.taken===true).length;
                  const missed=Object.values(logs).filter(l=>l.taken===false).length;
                  const total=Object.values(logs).filter(l=>l.taken!==null).length;
                  if(total===0)return null;
                  return <span style={{ color:missed>0?colors.accentWarm:colors.accent }}>💊 {taken}/{total}種服薬{missed>0?`（${missed}種飲めず）`:""}</span>;

  const SummaryView = () => {
    const [lastVisit, setLastVisit] = useState("");
    const [editingDate, setEditingDate] = useState(true);
    const [lvLoading, setLvLoading] = useState(true);
    useEffect(()=>{ sget("koala-last-visit").then(v=>{ if(v){setLastVisit(v);setEditingDate(false);} setLvLoading(false); }); },[]);
    const saveLastVisit = async (date) => { await sset("koala-last-visit",date); setLastVisit(date); setEditingDate(false); };

    const allEntries = Object.entries(allData).sort((a,b)=>a[0].localeCompare(b[0]));
    const entries = lastVisit ? allEntries.filter(([k])=>k>lastVisit) : allEntries.slice(-14);
    const periodLabel = lastVisit ? `${formatDate(lastVisit)}以降（${entries.length}日分）` : `直近14日間（${entries.length}日分）`;

    if (allEntries.length===0) return <div style={{ textAlign:"center",padding:"40px 20px",color:colors.textLight }}><KoalaFace mood={3}/><div style={{ marginTop:"12px",fontSize:"14px" }}>まだ記録がありません</div></div>;

    const moodEs=entries.filter(e=>e[1].mood);
    const avgMood=moodEs.length>0?(moodEs.reduce((s,e)=>s+e[1].mood,0)/moodEs.length).toFixed(1):"—";
    const siDays=entries.filter(e=>e[1].hasSI).length;
    const siMax=siDays>0?Math.max(...entries.filter(e=>e[1].hasSI).map(e=>e[1].siIntensity||0)):0;
    const moodTrend=entries.filter(e=>e[1].mood).slice(-14);
    const medStats=medList.map(med=>{
      const rec=entries.filter(e=>e[1].medLogs?.[med.id]?.taken!==undefined&&e[1].medLogs?.[med.id]?.taken!==null);
      return {...med,recorded:rec.length,taken:rec.filter(e=>e[1].medLogs[med.id].taken===true).length,missed:rec.filter(e=>e[1].medLogs[med.id].taken===false).length};
    });
    const symMap={};
    entries.forEach(([,d])=>(d.symptoms||[]).forEach(s=>{symMap[s]=(symMap[s]||0)+1;}));
    const topSyms=Object.entries(symMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const sleepEs=entries.filter(e=>e[1].sleepHours);
    const avgSleep=sleepEs.length>0?(sleepEs.reduce((s,e)=>s+Number(e[1].sleepHours),0)/sleepEs.length).toFixed(1):"—";
    const appEs=entries.filter(e=>e[1].appetite);
    const avgApp=appEs.length>0?(appEs.reduce((s,e)=>s+e[1].appetite,0)/appEs.length).toFixed(1):"—";
    const appLabel=avgApp!=="—"?APPETITE.find(a=>a.value===Math.round(Number(avgApp)))?.label||"—":"—";
    const moodInfo=MOODS.find(m=>m.value===Math.round(Number(avgMood)));
    const memoEs=entries.filter(([,d])=>d.memo);

    const summaryText=`【診察まとめ】${lastVisit?`\n期間: ${lastVisit} ～ ${todayKey}`:""}
記録日数: ${entries.length}日

■ 気分
・平均: ${avgMood}/5（${moodInfo?.label||"—"}）
・希死念慮があった日: ${siDays}日${siDays>0?`（最大強度: ${siMax}/5）`:""}

■ 睡眠・食欲
・平均睡眠時間: ${avgSleep}時間
・食欲（平均）: ${appLabel}

■ よくあった症状
${topSyms.length>0?topSyms.map(([s,n])=>`  ・${s}（${n}日）`).join("\n"):"  ・なし"}

■ 服薬状況
${medStats.length>0?medStats.map(m=>`  ・${m.name}（${m.timing||""}）: ${m.recorded>0?`${m.taken}/${m.recorded}日服薬、${m.missed}日飲めず`:"記録なし"}`).join("\n"):"  ・薬の記録なし"}

■ 気になったこと・メモ
${memoEs.length>0?memoEs.map(([k,d])=>`  ${k}: ${d.memo}`).join("\n"):"  ・なし"}`;

    if (lvLoading) return <div style={{ textAlign:"center",padding:"40px",color:colors.textLight }}>読み込み中…</div>;

      <div>
        <div style={{ ...cardStyle,borderColor:editingDate?colors.accent:colors.border }}>

            </div>
          ):(
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between" }}>
              <div>
                <div style={{ fontSize:"15px",fontWeight:"600",color:colors.primary }}>{formatDate(lastVisit)}</div>
                <div style={{ fontSize:"12px",color:colors.textLight,marginTop:"2px" }}>{periodLabel}</div>
              </div>
              <button onClick={()=>setEditingDate(true)} style={{ fontSize:"12px",color:colors.textLight,background:"none",border:`1px solid ${colors.border}`,borderRadius:"12px",padding:"4px 12px",cursor:"pointer" }}>変更</button>
            </div>
          )}
        </div>

        {entries.length===0?(
          <div style={{ textAlign:"center",padding:"30px 20px",color:colors.textLight,fontSize:"14px" }}>この期間の記録がありません</div>
        ):(<>
          <div style={cardStyle}>
            <div style={{ fontSize:"14px",fontWeight:"600",color:colors.text,marginBottom:"12px" }}>📋 {periodLabel}のまとめ</div>
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px" }}>
              {[
                {label:"平均気分",value:avgMood!=="—"?`${avgMood}/5`:"—",color:colors.primary},
                {label:"希死念慮があった日",value:`${siDays}日`,color:siDays>0?colors.accentWarm:colors.accent},
                {label:"平均睡眠時間",value:avgSleep!=="—"?`${avgSleep}h`:"—",color:colors.primary},
                {label:"記録した日数",value:`${entries.length}日`,color:colors.accent},
              ].map(item=>(
                <div key={item.label} style={{ background:colors.bg,borderRadius:"12px",padding:"12px",textAlign:"center" }}>
                  <div style={{ fontSize:"20px",fontWeight:"700",color:item.color }}>{item.value}</div>
                  <div style={{ fontSize:"11px",color:colors.textLight,marginTop:"3px" }}>{item.label}</div>
                </div>
              ))}
            </div>
            {moodTrend.length>1&&(
              <div style={{ marginTop:"14px" }}>
                <div style={{ fontSize:"13px",fontWeight:"600",color:colors.text,marginBottom:"8px" }}>気分の推移</div>

                  {moodTrend.map(([key,d])=>(
                    <div key={key} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center" }}>
                      <div style={{ width:"100%",borderRadius:"3px 3px 0 0",height:`${(d.mood/5)*44}px`,background:MOODS.find(m=>m.value===d.mood)?.color||colors.primary,opacity:0.85 }}/>
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex",justifyContent:"space-between",fontSize:"10px",color:colors.textLight,marginTop:"3px" }}>
                  <span>{moodTrend[0]?.[0]?.slice(5)}</span><span>{moodTrend[moodTrend.length-1]?.[0]?.slice(5)}</span>
                </div>
              </div>
            )}
            {medStats.length>0&&(
              <div style={{ marginTop:"14px" }}>
                <div style={{ fontSize:"13px",fontWeight:"600",color:colors.text,marginBottom:"8px" }}>💊 服薬状況</div>
                {medStats.map(m=>{
                  const rate=m.recorded>0?m.taken/m.recorded:null;
                  return (
                    <div key={m.id} style={{ marginBottom:"8px" }}>
                      <div style={{ display:"flex",justifyContent:"space-between",marginBottom:"3px" }}>
                        <span style={{ fontSize:"12px",color:colors.text }}>{m.name}</span>
                        <span style={{ fontSize:"11px",color:colors.textLight }}>
                          {m.recorded>0?`${m.taken}/${m.recorded}日`:"未記録"}
                          {m.missed>0&&<span style={{ color:colors.accentWarm }}>　飲めず{m.missed}日</span>}
                        </span>
                      </div>
                      <div style={{ height:"7px",background:colors.border,borderRadius:"4px",overflow:"hidden" }}>
                        {rate!==null&&<div style={{ height:"100%",width:`${rate*100}%`,background:rate>=0.8?colors.accent:rate>=0.5?"#c8b870":colors.accentWarm,borderRadius:"4px" }}/>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {topSyms.length>0&&(
            <div style={cardStyle}>
              <div style={{ fontSize:"14px",fontWeight:"600",color:colors.text,marginBottom:"12px" }}>よくあった症状</div>
              {topSyms.map(([s,n])=>(
                <div key={s} style={{ display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px" }}>
                  <div style={{ height:"8px",borderRadius:"4px",background:colors.primary,width:`${(n/entries.length)*100}%`,minWidth:"12px" }}/>
                  <span style={{ fontSize:"13px",color:colors.text,whiteSpace:"nowrap" }}>{s}（{n}日）</span>
                </div>
              ))}
            </div>
          )}

          {memoEs.length>0&&(
            <div style={cardStyle}>
              <div style={{ fontSize:"14px",fontWeight:"600",color:colors.text,marginBottom:"12px" }}>📝 気になったこと・メモ</div>
              {memoEs.map(([key,d])=>(
                <div key={key} style={{ marginBottom:"10px" }}>
                  <div style={{ fontSize:"11px",color:colors.textLight,marginBottom:"3px" }}>{formatDate(key)}</div>
                  <div style={{ fontSize:"13px",color:colors.text,background:colors.bg,borderRadius:"8px",padding:"8px 10px",lineHeight:"1.6" }}>{d.memo}</div>
                </div>
              ))}
            </div>
          )}

          <div style={{ ...cardStyle,background:"#f0f7f3",borderColor:colors.accent }}>
            <div style={{ fontSize:"14px",fontWeight:"600",color:colors.text,marginBottom:"10px" }}>🩺 診察で使えるまとめ文</div>
            <pre style={{ fontSize:"12px",color:colors.text,lineHeight:"1.9",whiteSpace:"pre-wrap",fontFamily:"inherit",margin:0 }}>{summaryText}</pre>
            <button onClick={()=>navigator.clipboard?.writeText(summaryText)} style={{ marginTop:"12px",padding:"10px 20px",borderRadius:"20px",border:`1.5px solid ${colors.accent}`,background:"white",color:colors.accent,fontSize:"13px",cursor:"pointer",fontWeight:"600" }}>
              コピーする
            </button>
          </div>
        </>)}
      </div>
    );
  };

  const GraphView = () => {
    const [range, setRange] = useState(14);
    const [selectedDay, setSelectedDay] = useState(null);

    const allEntries = Object.entries(allData)
      .filter(([,d]) => d.mood)
      .sort((a,b) => a[0].localeCompare(b[0]));

    const cutoffKey = range > 0 ? (() => {
      const d = new Date(); d.setDate(d.getDate() - range + 1);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    })() : null;

    const entries = cutoffKey ? allEntries.filter(([k]) => k >= cutoffKey) : allEntries;

    if (allEntries.length === 0) return (
      <div style={{ textAlign:"center",padding:"40px 20px",color:colors.textLight }}>
        <KoalaFace mood={3}/><div style={{ marginTop:"12px",fontSize:"14px" }}>まだ記録がありません</div>
      </div>
    );

    // Daily chart
    const dW=320,dH=150,dpL=28,dpR=12,dpT=14,dpB=30;
    const diW=dW-dpL-dpR, diH=dH-dpT-dpB;
    const dyOf = v => dpT + diH - ((v-1)/4)*diH;
    const n = entries.length;
    const dxOf = i => dpL + (n>1?(i/(n-1))*diW:diW/2);
    const dPts = entries.map(([k,d],i) => ({ x:dxOf(i), y:dyOf(d.mood), mood:d.mood, key:k }));
    const dPath = dPts.length>1 ? dPts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') : null;
    const lblIdx = n<=7 ? dPts.map((_,i)=>i) : n<=14 ? [0,Math.floor(n/2),n-1] : [0,Math.floor(n/3),Math.floor(2*n/3),n-1];

    // Hourly chart
    const selData = selectedDay ? allData[selectedDay] : null;
    const hLog = selData?.moodLog?.length>0 ? selData.moodLog : null;
    const hW=320,hH=120,hpL=28,hpR=12,hpT=14,hpB=28;
    const hiW=hW-hpL-hpR, hiH=hH-hpT-hpB;
    const hyOf = v => hpT + hiH - ((v-1)/4)*hiH;
    const toMin = t => { const [h,m]=t.split(':').map(Number); return h*60+m; };
    let hPts=null, hPath=null;
    if (hLog) {
      const times=hLog.map(e=>toMin(e.time));
      const minT=Math.min(...times), spanT=Math.max(...times)-minT||60;
      const hxOf = t => hpL+((toMin(t)-minT)/spanT)*hiW;
      hPts = hLog.map(e=>({ x:hxOf(e.time), y:hyOf(e.mood), mood:e.mood, time:e.time }));
      hPath = hPts.length>1 ? hPts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') : null;
    }

    return (
      <div>
        <div style={cardStyle}>
          <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px" }}>
            <div style={{ display:"flex",alignItems:"center",gap:"6px" }}>
              <EucalyptusLeaf/>
              <span style={{ fontSize:"14px",fontWeight:"600",color:colors.text }}>日ごとの気分の推移</span>
            </div>
            <div style={{ display:"flex",gap:"4px" }}>
              {[{v:7,l:"7日"},{v:14,l:"14日"},{v:30,l:"30日"},{v:0,l:"全期間"}].map(({v,l})=>(
                <button key={v} onClick={()=>{setRange(v);setSelectedDay(null);}} style={{ fontSize:"11px",padding:"3px 8px",borderRadius:"12px",border:`1px solid ${range===v?colors.primary:colors.border}`,background:range===v?colors.primary:"white",color:range===v?"white":colors.textLight,cursor:"pointer" }}>{l}</button>
              ))}
            </div>
          </div>
          {entries.length===0 ? (
            <div style={{ fontSize:"13px",color:colors.textLight,textAlign:"center",padding:"20px" }}>この期間の記録がありません</div>
          ) : (<>
            <svg viewBox={`0 0 ${dW} ${dH}`} style={{ width:"100%",overflow:"visible" }}>
              {[1,2,3,4,5].map(v=>(
                <g key={v}>
                  <line x1={dpL} y1={dyOf(v)} x2={dW-dpR} y2={dyOf(v)} stroke={colors.border} strokeWidth="0.5" strokeDasharray="4,3"/>
                  <text x={dpL-4} y={dyOf(v)} fontSize="9" fill={colors.textLight} textAnchor="end" dominantBaseline="middle">{v}</text>
                </g>
              ))}
              {dPath&&<path d={dPath} fill="none" stroke={colors.primaryLight} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>}
              {dPts.map((p,i)=>{
                const mi=MOODS.find(m=>m.value===p.mood);
                return (
                  <g key={p.key} onClick={()=>setSelectedDay(prev=>prev===p.key?null:p.key)} style={{cursor:"pointer"}}>
                    <circle cx={p.x} cy={p.y} r={selectedDay===p.key?7:5} fill={mi?.color||colors.primary} stroke="white" strokeWidth="1.5"/>
                  </g>
                );
              })}
              {lblIdx.map(i=>(
                <text key={i} x={dPts[i].x} y={dH-4} fontSize="9" fill={colors.textLight} textAnchor="middle">{entries[i][0].slice(5)}</text>
              ))}
            </svg>
            <div style={{ display:"flex",gap:"8px",flexWrap:"wrap",marginTop:"6px" }}>
              {MOODS.map(m=>(
                <div key={m.value} style={{ display:"flex",alignItems:"center",gap:"3px" }}>
                  <div style={{ width:"8px",height:"8px",borderRadius:"50%",background:m.color }}/>
                  <span style={{ fontSize:"10px",color:colors.textLight }}>{m.label}</span>
                </div>
              ))}
            </div>
            <div style={{ fontSize:"11px",color:colors.textLight,marginTop:"6px",textAlign:"center" }}>ドットをタップするとその日の時間別グラフを表示</div>
          </>)}
        </div>

        {selectedDay&&(
          <div style={{ ...cardStyle,borderColor:colors.primary }}>
            <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px" }}>
              <div style={{ fontSize:"13px",fontWeight:"600",color:colors.text }}>{formatDate(selectedDay)}の時間別気分</div>
              <button onClick={()=>setSelectedDay(null)} style={{ fontSize:"11px",color:colors.textLight,background:"none",border:`1px solid ${colors.border}`,borderRadius:"12px",padding:"2px 8px",cursor:"pointer" }}>閉じる</button>
            </div>
            {hPts ? (
              <svg viewBox={`0 0 ${hW} ${hH}`} style={{ width:"100%" }}>
                {[1,2,3,4,5].map(v=>(
                  <g key={v}>
                    <line x1={hpL} y1={hyOf(v)} x2={hW-hpR} y2={hyOf(v)} stroke={colors.border} strokeWidth="0.5" strokeDasharray="4,3"/>
                    <text x={hpL-4} y={hyOf(v)} fontSize="9" fill={colors.textLight} textAnchor="end" dominantBaseline="middle">{v}</text>
                  </g>
                ))}
                {hPath&&<path d={hPath} fill="none" stroke={colors.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>}
                {hPts.map((p,i)=>{
                  const mi=MOODS.find(m=>m.value===p.mood);
                  return (
                    <g key={i}>
                      <circle cx={p.x} cy={p.y} r={5} fill={mi?.color||colors.primary} stroke="white" strokeWidth="1.5"/>
                      <text x={p.x} y={hH-4} fontSize="9" fill={colors.textLight} textAnchor="middle">{p.time}</text>
                    </g>
                  );
                })}
              </svg>
            ) : (
              <div style={{ fontSize:"12px",color:colors.textLight,textAlign:"center",padding:"16px" }}>
                この日は時間別の記録がありません<br/>
                <span style={{ fontSize:"11px" }}>（✏️記録タブで気分を時間ごとに追加できます）</span>
              </div>
            )}
          </div>
        )}
      </div>
    );
  };

  if (loading) return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#f5f0f8",gap:"16px" }}>
      <KoalaTiny size={48}/><div style={{ fontSize:"14px",color:"#7a6e84" }}>読み込み中…</div>
    </div>
  );

  return (
    <div style={{ background:colors.bg,minHeight:"100vh",fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" }}>
      <div style={{ background:"white",borderBottom:`1px solid ${colors.border}`,padding:"10px 20px",display:"flex",alignItems:"center",gap:"10px",position:"sticky",top:0,zIndex:10 }}>
        <KoalaTiny size={32}/>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:"16px",fontWeight:"700",color:colors.text }}>コアラの体調ノート</div>
          <div style={{ fontSize:"11px",color:colors.textLight }}>{view==="record"?formatDate(selectedKey):view==="history"?"過去の記録":view==="graph"?"グラフ":"診察まとめ"}</div>
        </div>
        <KoalaTiny size={26}/>
      </div>
      <div style={{ maxWidth:"500px",margin:"0 auto",padding:"16px 16px 100px" }}>
        {view==="record"&&<RecordView/>}
        {view==="history"&&<HistoryView/>}
        {view==="graph"&&<GraphView/>}
        {view==="summary"&&<SummaryView/>}
      </div>
      <div style={{ position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:`1px solid ${colors.border}`,display:"flex",justifyContent:"center",padding:"8px 0 12px" }}>
        {[{key:"record",icon:"✏️",label:"記録"},{key:"history",icon:"📅",label:"履歴"},{key:"graph",icon:"📊",label:"グラフ"},{key:"summary",icon:"🩺",label:"まとめ"}].map(tab=>(
          <button key={tab.key} onClick={()=>setView(tab.key)} style={{ flex:1,maxWidth:"140px",padding:"6px 4px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:"2px" }}>
            <span style={{ fontSize:"20px" }}>{tab.icon}</span>
            <span style={{ fontSize:"11px",color:view===tab.key?colors.primary:colors.textLight,fontWeight:view===tab.key?"700":"400" }}>{tab.label}</span>
            {view===tab.key&&<div style={{ width:"4px",height:"4px",borderRadius:"50%",background:colors.primary }}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
